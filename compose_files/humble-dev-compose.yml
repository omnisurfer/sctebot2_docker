services:
  # developer container
  humble_dev:
    extends: 
      file: humble-base-compose.yml
      service: humble_overlay
    container_name: sctebot2_ros2_humble_dev
    image: sctebot2_ros2_humble_dev:latest    
    build:
      context: ../
      dockerfile: docker_files/Dockerfile.humble_dev
      target: humble_dev
    volumes:
     # mount the source code
      - ../../sctebot2_robot:/overlay_ws/src/sctebot2_robot:rw
      - ../../sctebot2_desktop:/overlay_ws/src/sctebot2_desktop:rw
    command: sleep infinity